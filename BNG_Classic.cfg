#--------------------------------------------------echo "Connector Configuration"#--------------------------------------------------    port 1/1/c1        connector            breakout c1-100g        exit        no shutdown    exit    port 1/1/c2        connector            breakout c1-100g        exit        no shutdown    exit    port 1/1/c3        shutdown    exit    port 1/1/c4        shutdown    exit    port 1/1/c5        shutdown    exit    port 1/1/c6        shutdown    exit#--------------------------------------------------echo "LAG Configuration"#--------------------------------------------------    lag 1        mode access        encap-type dot1q        port 1/1/c1/1        port 1/1/c2/1        no shutdown    exit#--------------------------------------------------echo "LAG Configuration"#--------------------------------------------------    lag 1        mode access        encap-type dot1q        port 1/1/c1/1        port 1/1/c2/1        no shutdown    exit#--------------------------------------------------echo "Service Configuration"#--------------------------------------------------    service        customer 1 name "1" create            description "Default customer"        exit        vprn 18 name "18" customer 1 create            interface "loopback" create            exit            subscriber-interface "toSubs" create                group-interface "subs" create                exit            exit            dhcp                local-dhcp-server "LOCAL" create                exit            exit                              exit        vprn 18 name "18" customer 1 create            interface "loopback" create                address 192.168.1.1/32                local-dhcp-server "LOCAL"                loopback            exit            subscriber-interface "toSubs" create                address 10.1.1.254/24                group-interface "subs" create                    dhcp                        server 192.168.1.1                        lease-populate 5                        gi-address 10.1.1.254                        no shutdown                    exit                    host-connectivity-verify                    sap lag-1:100 create                    exit                exit            exit            no shutdown        exit    exit#--------------------------------------------------echo "Local DHCP Server (Services) Configuration"#--------------------------------------------------    service        vprn 18 name "18" customer 1 create            dhcp                local-dhcp-server "LOCAL" create                    use-gi-address                    pool "pool1" create                        subnet 10.1.1.0/24 create                            options                                subnet-mask 255.255.255.0                                default-router 10.1.1.254                            exit                            address-range 10.1.1.150 10.1.1.200                        exit                    exit                    no shutdown                exit            exit        exit    exit